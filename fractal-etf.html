<script>
var ETFS=[
  {id:'EWY',name:'한국',flag:'🇰🇷',region:'아시아',hex:'#3b82f6'},
  {id:'FXI',name:'중국',flag:'🇨🇳',region:'아시아',hex:'#ef4444'},
  {id:'EWJ',name:'일본',flag:'🇯🇵',region:'아시아',hex:'#f59e0b'},
  {id:'EWT',name:'대만',flag:'🇹🇼',region:'아시아',hex:'#06b6d4'},
  {id:'EPI',name:'인도',flag:'🇮🇳',region:'아시아',hex:'#ff8c42'},
  {id:'EWH',name:'홍콩',flag:'🇭🇰',region:'아시아',hex:'#e879f9'},
  {id:'EWS',name:'싱가포르',flag:'🇸🇬',region:'아시아',hex:'#a3e635'},
  {id:'EWA',name:'호주',flag:'🇦🇺',region:'아시아',hex:'#fbbf24'},
  {id:'THD',name:'태국',flag:'🇹🇭',region:'아시아',hex:'#f472b6'},
  {id:'EWG',name:'독일',flag:'🇩🇪',region:'유럽',hex:'#facc15'},
  {id:'EWQ',name:'프랑스',flag:'🇫🇷',region:'유럽',hex:'#60a5fa'},
  {id:'EWU',name:'영국',flag:'🇬🇧',region:'유럽',hex:'#c084fc'},
  {id:'EWI',name:'이탈리아',flag:'🇮🇹',region:'유럽',hex:'#34d399'},
  {id:'EWP',name:'스페인',flag:'🇪🇸',region:'유럽',hex:'#fb923c'},
  {id:'EWN',name:'네덜란드',flag:'🇳🇱',region:'유럽',hex:'#f97316'},
  {id:'EWD',name:'스웨덴',flag:'🇸🇪',region:'유럽',hex:'#38bdf8'},
  {id:'EWL',name:'스위스',flag:'🇨🇭',region:'유럽',hex:'#fb7185'},
  {id:'EWZ',name:'브라질',flag:'🇧🇷',region:'아메리카',hex:'#4ade80'},
  {id:'EWC',name:'캐나다',flag:'🇨🇦',region:'아메리카',hex:'#f87171'},
  {id:'EWW',name:'멕시코',flag:'🇲🇽',region:'아메리카',hex:'#a78bfa'},
  {id:'EZA',name:'남아공',flag:'🇿🇦',region:'기타',hex:'#2dd4bf'}
];
var REGIONS=['전체','아시아','유럽','아메리카','기타'];
var MODES={'1m':{lb:60,fw:20,label:'1개월',lbLabel:'60일'},'3m':{lb:60,fw:60,label:'3개월',lbLabel:'60일'}};
var OV_C=['#06b6d4','#a855f7','#ff8c42'];
var etfData={},curETF='EWY',curMode='1m',curResult=null,mainChart=null,selOv=[],curRegion='전체';

/* === CSV === */
function loadCSV(id){
  return new Promise(function(res,rej){
    Papa.parse('data/'+id+'.csv',{download:true,header:true,skipEmptyLines:true,
      complete:function(r){
        var rows=r.data.filter(function(x){return x.Date&&x.Close})
          .map(function(x){return{date:x.Date,price:parseFloat(x.Close)}})
          .filter(function(x){return!isNaN(x.price)&&x.price>0})
          .sort(function(a,b){return a.date.localeCompare(b.date)});
        res(rows);
      },error:rej});
  });
}

/* === MATH === */
function dRet(p){var r=[];for(var i=1;i<p.length;i++)r.push((p[i]-p[i-1])/p[i-1]);return r}
function pears(a,b){
  var n=a.length;if(!n)return 0;
  var ma=0,mb=0,i;for(i=0;i<n;i++){ma+=a[i];mb+=b[i]}ma/=n;mb/=n;
  var nm=0,da=0,db=0;for(i=0;i<n;i++){var x=a[i]-ma,y=b[i]-mb;nm+=x*y;da+=x*x;db+=y*y}
  var dn=Math.sqrt(da)*Math.sqrt(db);return dn===0?0:nm/dn;
}

/* === ANALYSIS === */
function analyze(data){
  var mode=MODES[curMode],LB=mode.lb,FW=mode.fw,TOP_N=15;
  var prices=data.map(function(d){return d.price});
  var dates=data.map(function(d){return d.date});
  var n=prices.length;
  if(n<LB+FW+10)return{error:'데이터가 부족합니다 (최소 '+(LB+FW+10)+'일 필요)',cp:0,cd:''};
  var cw=prices.slice(n-LB),cr=dRet(cw),cp=prices[n-1],cd=dates[n-1];
  var matches=[];
  for(var i=LB;i<=n-LB-FW;i++){
    var w=prices.slice(i,i+LB),ret=dRet(w),corr=pears(cr,ret);
    if(corr>0.5){
      var fp=prices.slice(i+LB,i+LB+FW),bp=prices[i+LB-1];
      var fr=fp.map(function(p){return(p-bp)/bp});
      matches.push({
        sd:dates[i],ed:dates[i+LB-1],corr:corr,
        fr:fr,ffr:fr.length?fr[fr.length-1]:0,
        lbP:prices.slice(i,i+LB),
        fwP:fp,bp:bp
      });
    }
  }
  matches.sort(function(a,b){return b.corr-a.corr});
  var top=matches.slice(0,TOP_N);
  if(top.length<2)return{error:'유사 패턴이 부족합니다 (상관계수 > 0.5 기준)',cp:cp,cd:cd};

  var af=top.map(function(m){return m.fr});
  var nd=Math.min.apply(null,af.map(function(r){return r.length}));
  var sc={bull:[],bear:[],avg:[],maxB:[],minB:[],dates:[]};
  var ld=new Date(cd);
  for(var d=0;d<nd;d++){
    var dr=af.map(function(r){return r[d]}).filter(function(v){return v!==undefined});
    dr.sort(function(a,b){return a-b});
    var avg=dr.reduce(function(s,v){return s+v},0)/dr.length;
    var q1=Math.max(Math.floor(dr.length*0.25),1),q3=Math.floor(dr.length*0.75);
    var bear=dr.slice(0,q1).reduce(function(s,v){return s+v},0)/q1;
    var bull=dr.slice(q3).reduce(function(s,v){return s+v},0)/(dr.length-q3);
    sc.bull.push(cp*(1+bull));sc.bear.push(cp*(1+bear));sc.avg.push(cp*(1+avg));
    sc.maxB.push(cp*(1+dr[dr.length-1]));sc.minB.push(cp*(1+dr[0]));
    var nx=new Date(ld);nx.setDate(nx.getDate()+d+1);
    while(nx.getDay()===0||nx.getDay()===6)nx.setDate(nx.getDate()+1);
    sc.dates.push(nx.toISOString().split('T')[0]);
  }

  var up=top.filter(function(m){return m.ffr>0}).length;
  var wr=Math.round(up/top.length*100);
  var ac=top.reduce(function(s,m){return s+m.corr},0)/top.length;

  return{
    cp:cp,cd:cd,sc:sc,top:top,total:matches.length,
    hP:prices.slice(n-LB),hD:dates.slice(n-LB),
    bullT:sc.bull[sc.bull.length-1],bearT:sc.bear[sc.bear.length-1],avgT:sc.avg[sc.avg.length-1],
    wr:wr,ac:ac
  };
}

/* === CHART PLUGINS === */
var wmPlugin={id:'wm',beforeDraw:function(ch){var ctx=ch.ctx,ca=ch.chartArea;if(!ca)return;ctx.save();ctx.font='800 36px "Plus Jakarta Sans",sans-serif';ctx.fillStyle='rgba(255,255,255,0.03)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Herdvibe.com',(ca.left+ca.right)/2,(ca.top+ca.bottom)/2);ctx.restore()}};
var divPlugin={id:'div',afterDraw:function(ch){var meta=ch.getDatasetMeta(0);if(!meta||!meta.data)return;var lp=null;for(var i=meta.data.length-1;i>=0;i--){if(ch.data.datasets[0].data[i]!==null){lp=meta.data[i];break}}if(!lp)return;var ctx=ch.ctx,yA=ch.scales.y;ctx.save();ctx.beginPath();ctx.setLineDash([4,4]);ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.moveTo(lp.x,yA.top);ctx.lineTo(lp.x,yA.bottom);ctx.stroke();ctx.font="500 9px 'JetBrains Mono'";ctx.fillStyle='#555';ctx.textAlign='center';ctx.fillText('오늘',lp.x,yA.top-4);ctx.restore()}};

Chart.defaults.color='#666';Chart.defaults.borderColor='#1a1a1a';
Chart.defaults.font.family="'JetBrains Mono','Noto Sans KR',sans-serif";Chart.defaults.font.size=10;
Chart.defaults.responsive=true;Chart.defaults.maintainAspectRatio=false;

/* === BUILD CHART === */
function buildChart(r,ovs){
  var etf=ETFS.find(function(c){return c.id===curETF});
  var labels=r.hD.concat(r.sc.dates).map(function(d){return d.slice(5)});
  var hist=r.hP.concat(r.sc.dates.map(function(){return null}));
  var pad=r.hD.map(function(){return null}),cp=r.cp;
  var mk=function(arr){return pad.slice(0,-1).concat([cp]).concat(arr)};

  var ds=[
    {label:'실제 가격',data:hist,borderColor:etf.hex,backgroundColor:etf.hex+'12',borderWidth:2.5,pointRadius:0,tension:.3,fill:true,order:1},
    {label:'강세 (상위 25%)',data:mk(r.sc.bull),borderColor:'#22c55e',borderWidth:2,borderDash:[6,3],pointRadius:0,tension:.3,fill:false,order:2},
    {label:'평균',data:mk(r.sc.avg),borderColor:'#f59e0b',borderWidth:2,borderDash:[4,4],pointRadius:0,tension:.3,fill:false,order:3},
    {label:'약세 (하위 25%)',data:mk(r.sc.bear),borderColor:'#ef4444',borderWidth:2,borderDash:[6,3],pointRadius:0,tension:.3,fill:false,order:4},
    {label:'_max',data:mk(r.sc.maxB),borderColor:'transparent',backgroundColor:'rgba(34,197,94,0.04)',pointRadius:0,fill:false,tension:.3,order:10},
    {label:'_min',data:mk(r.sc.minB),borderColor:'transparent',backgroundColor:'rgba(239,68,68,0.04)',pointRadius:0,fill:'-1',tension:.3,order:11}
  ];

  ovs.forEach(function(ov,oi){
    var m=ov.data,color=OV_C[oi];
    var fwSF=cp/m.bp;
    var scaledLb=m.lbP.map(function(p){return p*(cp/m.lbP[m.lbP.length-1])});
    var scaledFw=m.fwP.map(function(p){return p*fwSF});
    var ovD=scaledLb.concat(scaledFw);
    while(ovD.length<labels.length)ovD.push(null);
    if(ovD.length>labels.length)ovD=ovD.slice(0,labels.length);
    ds.push({label:m.sd.slice(2)+'~'+m.ed.slice(2),data:ovD,borderColor:color,borderWidth:1.5,borderDash:[2,2],pointRadius:0,tension:.3,fill:false,order:5+oi});
  });

  return{labels:labels,datasets:ds};
}

function renderChart(r){
  var ctx=document.getElementById('fractalChart');if(!ctx)return;
  if(mainChart){mainChart.destroy();mainChart=null}
  var cd=buildChart(r,selOv);
  mainChart=new Chart(ctx,{type:'line',data:cd,options:{
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:true,position:'top',labels:{color:'#999',font:{size:10,family:"'Noto Sans KR'"},boxWidth:10,padding:10,usePointStyle:true,pointStyle:'line',
        filter:function(item){return item.text.charAt(0)!=='_'}}},
      tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',borderWidth:1,titleColor:'#999',bodyColor:'#eee',
        titleFont:{family:"'JetBrains Mono'",size:10},bodyFont:{family:"'JetBrains Mono'",size:11},
        callbacks:{label:function(c){if(c.raw===null)return null;if(c.dataset.label.charAt(0)==='_')return null;var v=c.raw;return' '+c.dataset.label+': $'+v.toFixed(2)}}}
    },
    scales:{
      x:{grid:{color:'rgba(255,255,255,0.02)'},ticks:{color:'#777',font:{size:9},maxTicksLimit:12,maxRotation:0}},
      y:{type:'logarithmic',position:'right',grid:{color:'rgba(255,255,255,0.02)'},ticks:{color:'#777',font:{size:9},callback:function(v){return'$'+v.toFixed(2)}}}
    }
  }});
}

/* === SPARKLINE === */
function drawSpark(id,rets){
  var c=document.getElementById(id);if(!c)return;
  var ctx=c.getContext('2d');c.width=80;c.height=24;
  if(!rets.length)return;
  var mn=Math.min.apply(null,rets),mx=Math.max.apply(null,rets),rg=mx-mn||0.01;
  var col=rets[rets.length-1]>=0?'#22c55e':'#ef4444';
  ctx.clearRect(0,0,80,24);ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.5;
  for(var i=0;i<rets.length;i++){var x=(i/(rets.length-1))*80,y=24-((rets[i]-mn)/rg)*20-2;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
  ctx.stroke();
}

/* === FORMAT === */
function fmtP(v){return v>=100?'$'+v.toLocaleString('en',{maximumFractionDigits:0}):'$'+v.toFixed(2)}
function fmtPct(v,base){var p=((v-base)/base*100);return(p>=0?'+':'')+p.toFixed(1)+'%'}

    '</div>'+

    '<div class="hv-card">'+
      '<div class="hv-card-head"><h2>'+etf.flag+' '+etf.name+' ('+etf.id+') 프랙탈 예측<span class="hv-card-head-sub">'+lbL+' 패턴 → '+fwL+' 투영</span></h2></div>'+
      '<div class="hv-card-body"><div class="chart-wrap"><canvas id="fractalChart"></canvas></div></div>'+
      '<div class="share-bar">'+
        '<div class="share-bar-preview"><span>'+etf.flag+' '+etf.name+' '+etf.id+' 프랙탈 예측</span> — herdvibe.com</div>'+
        '<div class="share-bar-buttons">'+
          '<button class="share-btn share-btn--x" onclick="doShare(\'twitter\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg><span class="label-text">트위터</span></button>'+
          '<button class="share-btn share-btn--kakao" onclick="doShare(\'kakao\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.463 2 10.691c0 2.724 1.8 5.112 4.508 6.458l-1.148 4.265a.5.5 0 0 0 .764.533l4.94-3.26c.304.02.612.03.936.03 5.523 0 10-3.462 10-7.735C22 6.463 17.523 3 12 3z"/></svg><span class="label-text">카카오톡</span></button>'+

          '<button class="share-btn share-btn--copy" onclick="doShare(\'link\',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span class="label-text">링크 복사</span></button>'+

/* === OVERLAY TOGGLE === */
function togOv(idx){
  var ei=-1;
  for(var i=0;i<selOv.length;i++){if(selOv[i].idx===idx){ei=i;break}}
  if(ei>=0)selOv.splice(ei,1);
  else{if(selOv.length>=3)selOv.shift();selOv.push({idx:idx,data:curResult.top[idx]})}

  document.querySelectorAll('.match-table tbody tr').forEach(function(r){r.className=''});
  selOv.forEach(function(ov,oi){
    var row=document.querySelector('.match-table tbody tr[data-i="'+ov.idx+'"]');
    if(row)row.className='sel-'+(oi+1);
  });
  for(var i=0;i<10;i++){var dot=document.getElementById('dot-'+i);if(dot)dot.style.background=''}
  selOv.forEach(function(ov,oi){var dot=document.getElementById('dot-'+ov.idx);if(dot)dot.style.background=OV_C[oi]});

  renderChart(curResult);
}

/* === REGION FILTER === */
function renderRegionTabs(){
  document.getElementById('regionTabs').innerHTML=REGIONS.map(function(r){
    return'<div class="region-tab'+(r===curRegion?' active':'')+'" onclick="switchRegion(\''+r+'\')">'+r+'</div>';
  }).join('');
}

function switchRegion(r){
  curRegion=r;
  renderRegionTabs();
  renderETFTabs();
}

/* === ETF TABS === */
function renderETFTabs(){
  var filtered=curRegion==='전체'?ETFS:ETFS.filter(function(e){return e.region===curRegion});
  document.getElementById('etfTabs').innerHTML=filtered.map(function(e){
    return'<div class="etf-tab'+(e.id===curETF?' active':'')+'" onclick="switchETF(\''+e.id+'\')">'+
      '<span class="flag">'+e.flag+'</span>'+
      '<span>'+e.id+'</span></div>';
  }).join('');
}

async function switchETF(id){
  curETF=id;selOv=[];renderETFTabs();
  runAnalysis();
}

function switchMode(mode){
  curMode=mode;
  document.querySelectorAll('.tf-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mode===mode)});
  selOv=[];
  runAnalysis();
}

async function runAnalysis(){
  var etf=ETFS.find(function(c){return c.id===curETF});
  var mode=MODES[curMode];
  if(!etfData[curETF]){
    document.getElementById('mainContent').innerHTML='<div class="loading-overlay"><div class="spinner"></div><div class="loading-text">'+etf.flag+' '+etf.name+' ('+etf.id+') '+mode.label+' 분석 중...</div></div>';
    try{etfData[curETF]=await loadCSV(curETF)}catch(e){document.getElementById('mainContent').innerHTML='<div class="loading-overlay"><div style="color:var(--hv-down)">'+e.message+'</div></div>';return}
  }
  renderAll(analyze(etfData[curETF]),etf);
}

/* === SHARE === */
var SHARE_URL='https://herdvibe.com/131';
function ensureKakao(){try{if(typeof Kakao!=='undefined'&&!Kakao.isInitialized())Kakao.init('a43ed7b39fac35458f4f9df925a279b5');return typeof Kakao!=='undefined'&&Kakao.isInitialized()}catch(e){return false}}
ensureKakao();
function doShare(p,b){
  var etf=ETFS.find(function(c){return c.id===curETF});
  var u=SHARE_URL,t=encodeURIComponent(etf.name+' ('+etf.id+') 프랙탈 예측 — 향후 '+MODES[curMode].label+' 시나리오 | herdvibe.com'),eu=encodeURIComponent(u);
  switch(p){
    case'twitter':window.open('https://twitter.com/intent/tweet?text='+t+'&url='+eu,'_blank');break;
    case'telegram':window.open('https://t.me/share/url?url='+eu+'&text='+t,'_blank');break;
    case'kakao':if(!ensureKakao()){cpClip(u);toast('링크 복사완료!');return}
      try{Kakao.Share.sendDefault({objectType:'feed',content:{title:etf.name+' ('+etf.id+') 프랙탈 예측 | Herdvibe',description:'과거 패턴 기반 향후 '+MODES[curMode].label+' 가격 시나리오',imageUrl:'https://raw.githubusercontent.com/kittycapital/kittycapital.github.io/main/assets/herdvibe-og.png',link:{mobileWebUrl:u,webUrl:u}},buttons:[{title:'대시보드 보기',link:{mobileWebUrl:u,webUrl:u}}]})}catch(e){cpClip(u);toast('링크 복사완료!')}break;
    case'link':cpClip(u);flashCp(b);toast('링크가 복사되었습니다');break;
  }
}
function cpClip(t){try{navigator.clipboard.writeText(t)}catch(e){try{window.parent.postMessage({type:'clipboard',text:t},'*')}catch(_){}}}
function flashCp(b){if(!b)return;var o=b.innerHTML;b.style.background='#22c55e';b.style.color='#fff';b.style.borderColor='#22c55e';b.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg><span class="label-text" style="color:#fff">복사됨!</span>';setTimeout(function(){b.style.background='';b.style.color='';b.style.borderColor='';b.innerHTML=o},2000)}
function toast(m){var c=document.querySelector('.toast-wrap');if(!c){c=document.createElement('div');c.className='toast-wrap';document.body.appendChild(c)}var t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(12px)';t.style.transition='.3s';setTimeout(function(){t.remove()},300)},3000)}

/* === RESIZE (iframe) === */
var _lastH=0,_ht,_settled=false;
function sendHeight(){
  clearTimeout(_ht);
  _ht=setTimeout(function(){
    var h=document.documentElement.scrollHeight;
    if(Math.abs(h-_lastH)>20){
      _lastH=h;_settled=false;
      window.parent.postMessage({type:'resize',height:h},'*');
    }else if(!_settled){
      _settled=true;
      window.parent.postMessage({type:'resize',height:h},'*');
    }
  },300);
}
window.addEventListener('message',function(e){if(e.data&&e.data.type==='requestResize'){_lastH=0;_settled=false;sendHeight()}});

/* === INIT === */
renderRegionTabs();
renderETFTabs();
runAnalysis();
window.addEventListener('resize',sendHeight);
</script>
